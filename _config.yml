title: Templo de Venus
subtitle:
description: >-
author: Dajjal
lang: es

# URL — GitHub Pages lo sobreescribe en producción
url: "https://dajjal-93.github.io"
baseurl: "/TemploDeVenus"

# Build
markdown: kramdown
highlighter: rouge
permalink: /textos/:title/
timezone: America/Mexico_City

kramdown:
  input: GFM
  syntax_highlighter: rouge
  smart_quotes: ["lsquo", "rsquo", "ldquo", "rdquo"]
  typographic_symbols:
    hellip: "…"
    ndash: "–"
    mdash: "—"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .gitignore
